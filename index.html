<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <button id="theme-toggle" class="theme-btn">🌙 다크 모드</button>
        <h1>행운의 로또 번호 추첨기 🍀</h1>
        <div class="result-container">
            <div id="lotto-numbers" class="numbers"></div>
            <div id="bonus-container" class="bonus" style="display: none;">
                <span class="plus-sign">+</span>
                <div id="bonus-number" class="numbers"></div>
            </div>
        </div>
        <button id="draw-btn">번호 뽑기!</button>

        <form action="https://formspree.io/f/mpqyvobp" method="POST" class="contact-form">
            <h2>제휴 문의 🤝</h2>
            <input type="email" name="email" placeholder="이메일 주소" required>
            <textarea name="message" placeholder="문의 내용을 입력해주세요." rows="4" required></textarea>
            <button type="submit">문의 보내기</button>
        </form>

        <div id="disqus_thread" style="margin-top: 50px; padding-top: 30px; border-top: 1px solid #eee;"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://jeyeong.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="script.js"></script>
</body>

</html>
