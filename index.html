<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <button id="theme-toggle" class="theme-btn">🌙 다크 모드</button>
        <h1>행운의 로또 번호 추첨기 🍀</h1>
        <div class="result-container">
            <div id="lotto-numbers" class="numbers"></div>
            <div id="bonus-container" class="bonus" style="display: none;">
                <span class="plus-sign">+</span>
                <div id="bonus-number" class="numbers"></div>
            </div>
        </div>
        <button id="draw-btn">번호 뽑기!</button>

        <form action="https://formspree.io/f/mpqyvobp" method="POST" class="contact-form">
            <h2>제휴 문의 🤝</h2>
            <input type="email" name="email" placeholder="이메일 주소" required>
            <textarea name="message" placeholder="문의 내용을 입력해주세요." rows="4" required></textarea>
            <button type="submit">문의 보내기</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
